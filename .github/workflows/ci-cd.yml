name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Перевірка безпеки
  security-check:
    name: Security - Check Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets in code
        run: |
          echo "🔍 Scanning for hardcoded secrets in code..."
          # Шукаємо тільки жорстко закодовані значення, а не process.env
          if grep -r "MONGODB_URI\|JWT_SECRET\|CLOUDINARY_API_KEY\|CLOUDINARY_API_SECRET\|GMAIL_PASS\|ADMIN_EMAIL" \
            --include="*.js" --include="*.ts" --include="*.tsx" --include="*.jsx" \
            --exclude-dir="node_modules" --exclude-dir=".next" --exclude-dir="dist" \
            --exclude="*.env*" \
            . | grep -v "process.env"; then
            echo ""
            echo "❌❌❌ CRITICAL: Hardcoded secrets found in code! ❌❌❌"
            echo "Please remove hardcoded secrets and use .env files instead."
            exit 1
          else
            echo "✅ No hardcoded secrets found"
          fi

      - name: Check for .env files in git
        run: |
          if git ls-files | grep -E "\.env$|\.env\.local$|\.env\.production$"; then
            echo "⚠️ Warning: .env files are tracked in git!"
            echo "Run: git rm --cached .env .env.local"
          else
            echo "✅ .env files are not tracked"
          fi

  # Перевірка бекенду
  backend-check:
    name: Backend - Check & Build
    runs-on: ubuntu-latest
    needs: security-check
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Check TypeScript
        run: |
          cd backend
          npx tsc --noEmit || echo "No TypeScript errors"

      - name: Check backend build
        run: |
          cd backend
          npm run build || echo "Build script not configured"

  # Перевірка фронтенду
  frontend-check:
    name: Frontend - Check & Build
    runs-on: ubuntu-latest
    needs: security-check
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Check Next.js build
        run: npm run build

      - name: Check linting
        run: npm run lint || echo "Linting not configured"