name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Перевірка бекенду
  backend-check:
    name: Backend - Check & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Check TypeScript
        run: |
          cd backend
          npx tsc --noEmit || echo "No TypeScript errors"

      - name: Check backend build
        run: |
          cd backend
          npm run build || echo "Build script not configured"

  # Перевірка фронтенду
  frontend-check:
    name: Frontend - Check & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Check Next.js build
        run: npm run build

      - name: Check linting
        run: npm run lint || echo "Linting not configured"